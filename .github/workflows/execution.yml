name: Strava Visibility Execution

on:
  schedule:
    - cron: '0 8 1 * *'  # Every first day of the month at 08:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode (full or partial). Leave empty for default (last 30 days).'
        required: false
        default: ''
      date_from:
        description: 'Start date YYYY-MM-DD (partial mode only)'
        required: false
        default: ''
      date_to:
        description: 'End date YYYY-MM-DD (partial mode only, defaults to today)'
        required: false
        default: ''
      activity_types:
        description: 'Activity types filter, comma-separated (e.g. Run,TrailRun). Leave empty for all types.'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_DATE_FROM: ${{ github.event.inputs.date_from }}
          INPUT_DATE_TO: ${{ github.event.inputs.date_to }}
          INPUT_ACTIVITY_TYPES: ${{ github.event.inputs.activity_types }}
        run: |
          [ -n "$INPUT_MODE" ] && export MODE="$INPUT_MODE"
          [ -n "$INPUT_DATE_FROM" ] && export DATE_FROM="$INPUT_DATE_FROM"
          [ -n "$INPUT_DATE_TO" ] && export DATE_TO="$INPUT_DATE_TO"
          [ -n "$INPUT_ACTIVITY_TYPES" ] && export ACTIVITY_TYPES="$INPUT_ACTIVITY_TYPES"
          python src/main.py

      - name: Publish report to summary
        run: cat reports/strava-visibility-report-*.md >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: strava-visibility-report
          path: reports/strava-visibility-report-*.md
          retention-days: 90
