name: Strava Visibility Execution

on:
  schedule:
    - cron: '0 8 1 * *'  # Every first day of the month at 08:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode (full or partial). Leave empty for default (last 30 days).'
        required: false
        default: ''
      date_from:
        description: 'Start date YYYY-MM-DD (partial mode only)'
        required: false
        default: ''
      date_to:
        description: 'End date YYYY-MM-DD (partial mode only, defaults to today)'
        required: false
        default: ''
      activity_types:
        description: 'Activity types filter, comma-separated (e.g. Run,TrailRun). Leave empty for all types.'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          INPUT_MODE: ${{ github.event.inputs.mode || vars.MODE }}
          INPUT_DATE_FROM: ${{ github.event.inputs.date_from || vars.DATE_FROM }}
          INPUT_DATE_TO: ${{ github.event.inputs.date_to || vars.DATE_TO }}
          INPUT_ACTIVITY_TYPES: ${{ github.event.inputs.activity_types || vars.ACTIVITY_TYPES }}
        run: |
          [ -n "$INPUT_MODE" ] && export MODE="$INPUT_MODE"
          [ -n "$INPUT_DATE_FROM" ] && export DATE_FROM="$INPUT_DATE_FROM"
          [ -n "$INPUT_DATE_TO" ] && export DATE_TO="$INPUT_DATE_TO"
          [ -n "$INPUT_ACTIVITY_TYPES" ] && export ACTIVITY_TYPES="$INPUT_ACTIVITY_TYPES"
          python src/main.py

      - name: Publish report to summary
        run: cat reports/strava-visibility-report-*.md >> $GITHUB_STEP_SUMMARY

      - name: Prepare email
        id: report
        run: |
          echo "file=$(ls reports/strava-visibility-report-*.md)" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Send report by email
        if: vars.MAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Strava Visibility Report — ${{ steps.report.outputs.date }}"
          to: ${{ vars.MAIL_TO }}
          from: Strava Visibility Tracker <${{ secrets.MAIL_USERNAME }}>
          body: file://${{ steps.report.outputs.file }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: strava-visibility-report
          path: reports/strava-visibility-report-*.md
          retention-days: 90
