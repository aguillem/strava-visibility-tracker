name: Strava Visibility Execution

on:
  schedule:
    - cron: "0 8 1 * *"  # First day of each month at 08:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Scan mode"
        required: false
        default: "partial"
        type: choice
        options:
          - partial
          - full
      date_from:
        description: "Start date (YYYY-MM-DD) — required if mode is partial"
        required: false
        type: string
      date_to:
        description: "End date (YYYY-MM-DD) — defaults to today"
        required: false
        type: string
      activity_types:
        description: "Activity types (comma-separated, e.g. Run,TrailRun) — leave empty for all"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Strava Visibility Tracker
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          MODE: ${{ github.event.inputs.mode || 'partial' }}
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO: ${{ github.event.inputs.date_to }}
          ACTIVITY_TYPES: ${{ github.event.inputs.activity_types }}
        run: python src/main.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strava-visibility-report
          path: strava-visibility-report-*.md
          retention-days: 90
